<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
    <h2>Two-Factor Authentication</h2>
    <p>Enter the 6-digit verification code shown in the terminal.</p>

    <form method="POST">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <div class="mb-3">
            <input type="text" class="form-control" name="otp" placeholder="Enter OTP" maxlength="6" required>
        </div>
        <button type="submit" class="btn btn-success">Verify</button>
        <a href="{{ url_for('auth.login') }}" class="btn btn-secondary">Back</a>
    </form>
</body>
</html>
